version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: atlas_redis
    ports:
      - "6379:6379"
    restart: always

  flower:
    image: mher/flower:latest
    container_name: atlas_flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
